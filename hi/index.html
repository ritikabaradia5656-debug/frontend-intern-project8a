<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choco & Cake Delight</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff7f0;
            color: #4b2e2e;
        }
        header {
            background-color: #5a2d2d;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        .card {
            display: inline-block;
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            width: 220px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #5a2d2d;
            color: white;
            text-align: center;
            padding: 10px;
        }
        button {
            background-color: #d2691e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #b3561a;
        }
    </style>
</head>
<body>

<header>
    <h1>🍫 Choco & Cake Delight 🎂</h1>
    <p>Spreading sweetness, one bite at a time</p>
</header>

<section>
    <h2>Our Specials</h2>

    <div class="card">
        <h3>Chocolate Truffles</h3>
        <p>Rich, creamy & handmade</p>
        <button>Order Now</button>
    </div>

    <div class="card">
        <h3>Classic Chocolate Cake</h3>
        <p>Soft, moist & delicious</p>
        <button>Order Now</button>
    </div>

    <div class="card">
        <h3>Red Velvet Cake</h3>
        <p>A perfect celebration cake</p>
        <button>Order Now</button>
    </div>
</section>

<footer>
    <p>© 2026 Choco & Cake Delight | Made with ❤️ on AWS</p>
</footer>

</body>
</html>
